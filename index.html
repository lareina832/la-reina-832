<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LA REINA 832</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* Fondo */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(255,20,147,.20),
transparent 60%);
z-index:0;
}

.particula{
position:absolute;
width:4px;
height:4px;
background:#ff4da6;
border-radius:50%;
animation:flotar linear infinite;
}

@keyframes flotar{
from{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

.contenedor{
width:95%;
max-width:600px;
text-align:center;
position:relative;
z-index:2;
}

.logo{
width:250px;
max-width:80%;
margin-bottom:20px;
filter:
drop-shadow(0 0 15px #ff4da6)
drop-shadow(0 0 20px #FFD700);
}

h1{
color:#FFD700;
font-size:34px;
margin-bottom:10px;
text-shadow:0 0 20px #FFD700;
}

.frase{
color:#ff66cc;
font-size:22px;
margin-bottom:30px;
text-shadow:0 0 15px #ff1493;
}

.panel{
background:rgba(0,0,0,.75);
border:2px solid #ff4da6;
border-radius:25px;
padding:30px;
box-shadow:0 0 30px #ff1493;
}

input{
width:100%;
padding:16px;
font-size:22px;
border:none;
border-radius:12px;
text-align:center;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;

background:linear-gradient(
45deg,
#ff1493,
#ff4da6,
#ff66cc
);

color:white;

box-shadow:
0 0 15px #ff1493,
0 0 30px #ff1493;

transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.resultado{
font-size:90px;
font-weight:bold;
margin-top:25px;
color:white;
text-shadow:
0 0 15px #ff4da6,
0 0 30px #ff1493,
0 0 50px #ff1493;
}

.textoResultado{
margin-top:10px;
color:#FFD700;
font-size:20px;
}

.girando{
animation:latido .1s infinite;
}

@keyframes latido{
50%{
transform:scale(1.05);
}
}

/* WhatsApp */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
padding:15px 20px;
border-radius:50px;
box-shadow:0 0 20px #25D366;
z-index:9999;
animation:pulso 1.5s infinite;
}

@keyframes pulso{
50%{
transform:scale(1.1);
}
}

</style>
</head>

<body>

<div class="contenedor">

<!-- CAMBIAR POR TU LOGO -->
<img
class="logo"
src="https://lareina832.github.io/la-reina-832/file_00000000a2c4720e94c7b05bf1f134fa.png"
alt="LA REINA 832">

<h1>👑 LA REINA 832 👑</h1>

<div class="frase">
✨ Descubrí tu número de la suerte ✨
</div>

<div id="resultado" class="resultado">
----
</div>

<div class="resultado-card" id="card4" style="display:none;">
<h3>👑 4 CIFRAS</h3>
<div id="resultado4" class="numeroResultado">----</div>
</div>

<div class="resultado-card" id="card3" style="display:none;">
<h3>🎯 3 CIFRAS</h3>
<div id="resultado3" class="numeroResultado">---</div>
</div>

<div class="resultado-card" id="card2" style="display:none;">
<h3>⭐ 2 CIFRAS</h3>
<div id="resultado2" class="numeroResultado">--</div>
</div>

<div class="resultado-card" id="cardoro" style="display:none;">
<h3>💎 NÚMERO DE ORO</h3>
<div id="resultadoOro" class="numeroResultado">832</div>
</div>

<div class="textoResultado">
🍀 Tu suerte comienza con un número 🍀
</div>

<button id="compartir" style="display:none;margin-top:20px;">
📤 COMPARTIR MI SUERTE
</button 

</div>

<a
class="whatsapp"
href="https://wa.me/543517682897?text=Hola%20quiero%20jugar"
target="_blank">
📲 JUGAR AHORA
</a>

<script>

/* Partículas */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particula";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=
(5+Math.random()*8)+"s";

p.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(p);

}

/* Generador */

function generar(){

let palabra=
document.getElementById("palabra").value;

if(!palabra){
alert("Escribí una palabra");
return;
}

let resultado=
document.getElementById("resultado");

resultado.classList.add("girando");

let vueltas=0;

let anim=setInterval(()=>{

resultado.innerText=
Math.floor(Math.random()*10000)
.toString()
.padStart(4,"0");

vueltas++;

if(vueltas>20){

clearInterval(anim);

let suma=0;

palabra=
palabra.toUpperCase();

for(let i=0;i<palabra.length;i++){

suma+=
palabra.charCodeAt(i);

}

let numero=
(suma*832)%10000;

resultado.innerText=
numero.toString().padStart(4,"0");

resultado.classList.remove("girando");

}

},100);

}

</script>

</body>
</html>
