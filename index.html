<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LA REINA 832</title>

<style>

body{
font-family: Arial;
text-align:center;
color:white;
margin:0;
background-image:url("https://raw.githubusercontent.com/lareina832/la-reina-832/main/Polish_20260304_093055926.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

h1{
font-size:40px;
margin-top:25px;
text-shadow:2px 2px 10px black;
}

.panel{
background:rgba(0,0,0,0.65);
padding:25px;
margin:20px auto;
width:90%;
max-width:650px;
border-radius:15px;
box-shadow:0 0 15px #ff4da6;
}

.numero{
font-size:70px;
color:#ff4da6;
font-weight:bold;
margin:20px;
}

/* RESULTADOS PRO */

.resultadosPro{
background:linear-gradient(180deg,#2b0033,#000);
padding:20px;
border-radius:20px;
position:relative;
overflow:hidden;
}

.resultadosPro::before{
content:"LA REINA 832";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:rgba(255,255,255,0.05);
font-weight:bold;
}

.fila{
display:flex;
justify-content:space-between;
padding:12px;
border-radius:12px;
margin:5px 0;
font-weight:bold;
}

.fila:nth-child(1){background:#ff4da6;}
.fila:nth-child(2){background:#9b59b6;}
.fila:nth-child(3){background:#3498db;}
.fila:nth-child(4){background:#e67e22;}
.fila:nth-child(5){background:#1abc9c;}
.fila:nth-child(6){background:#e74c3c;}
.fila:nth-child(7){background:#f1c40f;}
.fila:nth-child(8){background:#2ecc71;}
.fila:nth-child(9){background:#ff1493;}

.panel3{
position:fixed;
right:20px;
top:35%;
background:rgba(0,0,0,0.65);
border-radius:15px;
padding:15px;
}

.numero3{
font-size:30px;
color:#ffd700;
}

</style>
</head>

<body>

<h1>👑 LA REINA 832 👑</h1>

<div class="panel">
<h2>🔮 GENERADOR</h2>
<input id="palabra">
<button onclick="generar()">GENERAR</button>
<div id="resultado" class="numero">----</div>
</div>

<div class="panel">
<h2>🔥 NÚMERO CALIENTE</h2>
<div id="numeroCaliente" class="numero">----</div>
</div>

<div class="panel resultadosPro">

<div id="sorteo"></div>
<div id="fecha"></div>

<div class="fila"><span>CIUDAD</span><span id="ciudad"></span></div>
<div class="fila"><span>PROVINCIA</span><span id="provincia"></span></div>
<div class="fila"><span>SANTA FE</span><span id="santafe"></span></div>
<div class="fila"><span>CÓRDOBA</span><span id="cordoba"></span></div>
<div class="fila"><span>ENTRE RÍOS</span><span id="entrerios"></span></div>
<div class="fila"><span>URUGUAY</span><span id="uruguay"></span></div>
<div class="fila"><span>CORRIENTES</span><span id="corrientes"></span></div>
<div class="fila"><span>MENDOZA</span><span id="mendoza"></span></div>
<div class="fila"><span>CHACO</span><span id="chaco"></span></div>

</div>

<div class="panel">
<h2>👥 JUGADORES EN LÍNEA</h2>
<div id="contadorJugadores" class="numero"></div>
</div>

<button onclick="abrirPanel()">⚙ PANEL ADMIN</button>

<div id="panelAdmin" class="panel" style="display:none">

<input id="inputNumero">
<button onclick="guardarNumero()">Guardar número</button>

<input id="input_cordoba">
<button onclick="guardarResultado('cordoba')">Guardar Córdoba</button>

</div>

<div class="panel3">
<div id="tres1" class="numero3">000</div>
<div id="tres2" class="numero3">000</div>
<div id="tres3" class="numero3">000</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey: "AIza...",
databaseURL: "https://la-reina-832-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

onValue(ref(db,"resultados"),snap=>{
let data=snap.val();
for(let k in data){
let el=document.getElementById(k);
if(el) el.innerText=data[k];
}
});

onValue(ref(db,"numeroCaliente"),snap=>{
document.getElementById("numeroCaliente").innerText=snap.val();
});

window.generar=function(){
let p=document.getElementById("palabra").value;
let suma=0;
for(let i=0;i<p.length;i++) suma+=p.charCodeAt(i);
document.getElementById("resultado").innerText=(suma*832)%10000;
}

window.guardarNumero=function(){
set(ref(db,"numeroCaliente"),document.getElementById("inputNumero").value);
}

window.guardarResultado=function(l){
set(ref(db,"resultados/"+l),document.getElementById("input_"+l).value);
}

window.abrirPanel=function(){
let c=prompt("CLAVE");
if(c==="832REINA"){
document.getElementById("panelAdmin").style.display="block";
}
}

function random(){
document.getElementById("contadorJugadores").innerText=
Math.floor(Math.random()*(80-20+1))+20;
}

setInterval(random,10000);
random();

</script>

</body>
  </html>
