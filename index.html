<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LA REINA 832 VIP</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background-image:url('https://raw.githubusercontent.com/lareina832/la-reina-832/main/Polish_20260304_093055926.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.panel{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:500px;
box-shadow:0 0 25px #ff00cc;
}

h1{
color:#ff00cc;
text-shadow:0 0 20px #ff00cc;
}

input{
padding:12px;
width:80%;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff00cc;
color:white;
font-weight:bold;
cursor:pointer;
}

.resultado{
margin-top:20px;
font-size:26px;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="panel">

<h1>👑 LA REINA 832 VIP 👑</h1>

<p>Ingresá una palabra y descubrí tu número estratégico</p>

<input id="palabra" placeholder="Ej: REINA">

<br>

<button onclick="generar()">GENERAR NÚMERO</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function generar(){

let palabra = document.getElementById("palabra").value.toUpperCase();

if(palabra=="REINA"){
document.getElementById("resultado").innerHTML="✨ REINA = 1832 ✨";
}
else{
document.getElementById("resultado").innerHTML="Número estratégico: "+Math.floor(Math.random()*9999);
}

}

</script>

</body>
</html>
