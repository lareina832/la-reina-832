<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LA REINA 832</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start; /* Cambiado para que empiece desde arriba si es largo */
overflow-y:auto; /* Permite hacer scroll vertical si no entra en la pantalla */
position:relative;
padding:20px 0 80px 0; /* Espacio extra abajo para que el botón de WhatsApp no tape nada */
}

/* Fondo */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(255,20,147,.20),
transparent 60%);
z-index:0;
pointer-events:none;
}

.particula{
position:absolute;
width:4px;
height:4px;
background:#ff4da6;
border-radius:50%;
animation:flotar linear infinite;
pointer-events:none;
}

@keyframes flotar{
from{ transform:translateY(100vh); opacity:0; }
50%{ opacity:1; }
to{ transform:translateY(-100px); opacity:0; }
}

.contenedor{
width:95%;
max-width:600px;
text-align:center;
position:relative;
z-index:2;
margin:0 auto;
}

.logo{
width:220px; /* Un poquito más chico para optimizar espacio */
max-width:75%;
margin-bottom:15px;
filter:
drop-shadow(0 0 15px #ff4da6)
drop-shadow(0 0 20px #FFD700);
}

h1{
color:#FFD700;
font-size:30px;
margin-bottom:5px;
text-shadow:0 0 20px #FFD700;
}

.frase{
color:#ff66cc;
font-size:20px;
margin-bottom:20px;
text-shadow:0 0 15px #ff1493;
}

.panel{
background:rgba(0,0,0,.75);
border:2px solid #ff4da6;
border-radius:25px;
padding:25px 20px;
box-shadow:0 0 30px #ff1493;
}

input{
width:100%;
padding:14px;
font-size:20px;
border:none;
border-radius:12px;
text-align:center;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(45deg, #ff1493, #ff4da6, #ff66cc);
color:white;
box-shadow: 0 0 15px #ff1493, 0 0 30px #ff1493;
transition:.3s;
margin-bottom: 20px;
}

button:hover{
transform:scale(1.03);
}

/* Bloques de Resultados */
.bloque-resultado {
margin-top: 15px;
border-top: 1px dashed rgba(255, 77, 166, 0.3);
padding-top: 12px;
}

.bloque-resultado:first-of-type {
border-top: none;
padding-top: 5px;
}

.etiqueta {
color: #FFD700;
font-size: 18px;
font-weight: bold;
text-transform: uppercase;
margin-bottom: 5px;
text-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.resultado{
font-size: 45px;
font-weight:bold;
color:white;
text-shadow:
0 0 15px #ff4da6,
0 0 30px #ff1493,
0 0 50px #ff1493;
line-height: 1.1;
}

.girando{
animation:latido .1s infinite;
}

@keyframes latido{
50%{ transform:scale(1.05); }
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
padding:15px 20px;
border-radius:50px;
box-shadow:0 0 20px #25D366;
z-index:9999;
animation:pulso 1.5s infinite;
}

@keyframes pulso{
50%{ transform:scale(1.1); }
}
</style>
</head>

<body>

<div class="contenedor">

<img class="logo" src="https://lareina832.github.io/la-reina-832/file_00000000a2c4720e94c7b05bf1f134fa.png" alt="LA REINA 832">

<h1>👑 LA REINA 832 👑</h1>
<div class="frase">✨ Descubrí tu número de la suerte ✨</div>

<div class="panel">
<input id="palabra" placeholder="Escribí una palabra">
<button onclick="generar()">🎰 GENERAR</button>

<div class="bloque-resultado">
<div class="etiqueta">CUATRO CIFRAS</div>
<div id="res4" class="resultado">----</div>
</div>

<div class="bloque-resultado">
<div class="etiqueta">TRES CIFRAS</div>
<div id="res3" class="resultado">---</div>
</div>

<div class="bloque-resultado">
<div class="etiqueta">DOS CIFRAS</div>
<div id="res2" class="resultado">--</div>
</div>
</div>

</div>

<a class="whatsapp" href="https://wa.me/543517682897?text=Hola%20quiero%20jugar" target="_blank">📲 JUGAR AHORA</a>

<script>
/* Partículas */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particula";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(5+Math.random()*8)+"s";
p.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(p);
}

/* Generador */
function generar(){
let palabra = document.getElementById("palabra").value.trim();

if(!palabra){
alert("Escribí una palabra");
return;
}

let res4 = document.getElementById("res4");
let res3 = document.getElementById("res3");
let res2 = document.getElementById("res2");

res4.classList.add("girando");
res3.classList.add("girando");
res2.classList.add("girando");

let vueltas = 0;

let anim = setInterval(() => {
res4.innerText = Math.floor(Math.random()*10000).toString().padStart(4,"0");
res3.innerText = Math.floor(Math.random()*1000).toString().padStart(3,"0");
res2.innerText = Math.floor(Math.random()*100).toString().padStart(2,"0");

vueltas++;

if(vueltas > 20){
clearInterval(anim);

palabra = palabra.toUpperCase();
let suma = 0;

for(let i=0; i<palabra.length; i++){
suma += palabra.charCodeAt(i);
}

// Números diferentes usando diferentes multiplicadores fijos
let num4 = (suma * 832) % 10000;
let num3 = (suma * 473) % 1000;
let num2 = (suma * 19) % 100;

res4.innerText = num4.toString().padStart(4, "0");
res3.innerText = num3.toString().padStart(3, "0");
res2.innerText = num2.toString().padStart(2, "0");

res4.classList.remove("girando");
res3.classList.remove("girando");
res2.classList.remove("girando");
}
}, 100);
}
</script>

</body>
  </html>
