<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA REINA 832</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

h1{
color:#ff4da6;
text-shadow:0 0 20px #ff4da6;
}

.panel{
background:rgba(0,0,0,0.8);
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px #ff4da6;
}

.numero{
font-size:60px;
color:#ff4da6;
}

.panel p{
font-size:20px;
font-weight:bold;
background:rgba(255,255,255,0.05);
padding:8px;
border-radius:8px;
margin:5px 0;
}

.girando{
animation:spin 0.1s infinite;
}

@keyframes spin{
0%{transform:translateY(-5px);}
50%{transform:translateY(5px);}
100%{transform:translateY(-5px);}
}

button{
background:#ff4da6;
border:none;
color:white;
padding:12px 20px;
border-radius:10px;
margin-top:10px;
}

.admin{
display:none;
border:2px solid #ff4da6;
}
</style>
</head>

<body>

<h1>👑 LA REINA 832 👑</h1>

<div class="panel">
<h2>🎰 GENERADOR</h2>
<input id="palabra" placeholder="Tu palabra" style="padding:10px;width:80%;">
<br>
<button onclick="generar()">GIRAR</button>
<div id="resultado" class="numero">----</div>
</div>

<div class="panel">
<h2>🔥 NÚMERO CALIENTE</h2>
<div id="numeroCaliente" class="numero">----</div>
</div>

<div class="panel">
<h2>📊 RESULTADOS DEL DÍA</h2>

<p>CIUDAD: <span id="ciudad">----</span></p>
<p>PROVINCIA: <span id="provincia">----</span></p>
<p>CÓRDOBA: <span id="cordoba">----</span></p>
<p>SANTA FE: <span id="santafe">----</span></p>
<p>ENTRE RÍOS: <span id="entrerios">----</span></p>
<p>CORRIENTES: <span id="corrientes">----</span></p>
<p>MENDOZA: <span id="mendoza">----</span></p>
<p>CHACO: <span id="chaco">----</span></p>
<p>URUGUAY: <span id="uruguay">----</span></p>

</div>

<div class="panel">
<h2>👑 LOS 3 DE LAS 3</h2>
<div class="numero" id="tres1">000</div>
<div class="numero" id="tres2">000</div>
<div class="numero" id="tres3">000</div>
</div>

<div class="panel">
<a href="https://wa.me/543517682897?text=🔥%20QUIERO%20JUGAR%20YA" target="_blank">
<button style="background:#25D366">📲 JUGAR AHORA</button>
</a>
</div>

<button onclick="abrirPanel()">⚙ ADMIN</button>

<div id="admin" class="panel admin">

<h3>NÚMERO CALIENTE</h3>
<input id="inputNumero"><button onclick="guardarNumero()">OK</button>

<h3>RESULTADOS</h3>

<input id="input_ciudad" placeholder="Ciudad">
<button onclick="guardarResultado('ciudad')">OK</button><br>

<input id="input_provincia" placeholder="Provincia">
<button onclick="guardarResultado('provincia')">OK</button><br>

<input id="input_cordoba" placeholder="Córdoba">
<button onclick="guardarResultado('cordoba')">OK</button><br>

<input id="input_santafe" placeholder="Santa Fe">
<button onclick="guardarResultado('santafe')">OK</button><br>

<input id="input_entrerios" placeholder="Entre Ríos">
<button onclick="guardarResultado('entrerios')">OK</button><br>

<input id="input_corrientes" placeholder="Corrientes">
<button onclick="guardarResultado('corrientes')">OK</button><br>

<input id="input_mendoza" placeholder="Mendoza">
<button onclick="guardarResultado('mendoza')">OK</button><br>

<input id="input_chaco" placeholder="Chaco">
<button onclick="guardarResultado('chaco')">OK</button><br>

<input id="input_uruguay" placeholder="Uruguay">
<button onclick="guardarResultado('uruguay')">OK</button>

<h3>LOS 3</h3>

<input id="input_tres1">
<button onclick="guardar3('tres1')">OK</button><br>

<input id="input_tres2">
<button onclick="guardar3('tres2')">OK</button><br>

<input id="input_tres3">
<button onclick="guardar3('tres3')">OK</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "la-reina-832.firebaseapp.com",
databaseURL: "https://la-reina-832-default-rtdb.firebaseio.com",
projectId: "la-reina-832"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CLAVE="832REINA";

/* GENERADOR */
window.generar=function(){

let palabra=document.getElementById("palabra").value;
if(!palabra){alert("Escribí algo");return;}

let div=document.getElementById("resultado");
div.classList.add("girando");

let vueltas=0;

let anim=setInterval(()=>{
div.innerText=Math.floor(Math.random()*10000).toString().padStart(4,'0');
vueltas++;

if(vueltas>20){
clearInterval(anim);

let suma=0;
palabra=palabra.toUpperCase();

for(let i=0;i<palabra.length;i++){
suma+=palabra.charCodeAt(i);
}

let numero=(suma*832)%10000;
numero=numero.toString().padStart(4,'0');

div.classList.remove("girando");
div.innerText=numero;
}
},100);

};

/* ADMIN */
window.abrirPanel=function(){
let clave=prompt("Clave admin");
if(clave===CLAVE){
document.getElementById("admin").style.display="block";
}else{
alert("Incorrecto");
}
};

/* GUARDAR */
window.guardarNumero=function(){
let v=document.getElementById("inputNumero").value;
set(ref(db,"numeroCaliente"),v);
};

window.guardarResultado=function(lugar){
let v=document.getElementById("input_"+lugar).value;
set(ref(db,"resultados/"+lugar),v);
};

window.guardar3=function(id){
let v=document.getElementById("input_"+id).value;
set(ref(db,"tres/"+id),v);
};

/* LEER */
onValue(ref(db,"numeroCaliente"),snap=>{
if(snap.exists()){
document.getElementById("numeroCaliente").innerText=snap.val();
}
});

onValue(ref(db,"resultados"),snap=>{
let d=snap.val();
if(!d)return;

for(let k in d){
let el=document.getElementById(k);
if(el) el.innerText=d[k];
}
});

onValue(ref(db,"tres"),snap=>{
let d=snap.val();
if(!d)return;

for(let k in d){
let el=document.getElementById(k);
if(el) el.innerText=d[k];
}
});

</script>

</body>
  </html>
