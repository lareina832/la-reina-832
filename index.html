<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LA REINA 832</title>

<style>

body{

margin:0;
font-family:Arial;
color:white;
text-align:center;

background-image:url("https://raw.githubusercontent.com/lareina832/la-reina-832/main/Polish_20260304_093055926.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

}

.capa{

background:rgba(0,0,0,0.65);
min-height:100vh;
padding:30px;

}

h1{

font-size:60px;
color:#ff2ec4;
text-shadow:0 0 25px #ff00cc;

}

.mensaje{

font-size:20px;
margin:25px;

}

input{

padding:18px;
font-size:24px;
border-radius:12px;
border:none;
width:80%;
max-width:350px;

}

button{

padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
margin:10px;
cursor:pointer;

}

.boton{

background:#ff2ec4;
color:white;

}

.resultado{

font-size:55px;
margin:25px;
font-weight:bold;
animation:brillo 1s infinite alternate;

}

@keyframes brillo{

from{ text-shadow:0 0 10px #fff;}
to{ text-shadow:0 0 30px #ff00cc;}

}

.favoritos{

margin-top:30px;

}

.numero{

display:inline-block;
background:#ff2ec4;
padding:18px 28px;
margin:10px;
border-radius:15px;
font-size:35px;
box-shadow:0 0 15px black;

}

.caliente{

background:gold;
color:black;
font-size:40px;

}

.whatsapp{

background:#25D366;
color:white;
font-size:22px;

}

#admin{

display:none;
margin-top:40px;

}

textarea{

width:90%;
height:120px;
font-size:20px;
border-radius:10px;
padding:10px;

}

</style>

</head>

<body>

<div class="capa">

<h1>👑 LA REINA 832 👑</h1>

<div class="mensaje">

💰✨ DECRETO DE ABUNDANCIA ✨💰  
Hoy la suerte camina conmigo.  
Hoy el dinero fluye hacia mí.  
Hoy los números se alinean a mi favor.  
Confío. Juego. Gano. 🍀

</div>

<br>

<input id="palabra" placeholder="Escribe una palabra">

<br>

<button class="boton" onclick="generar()">GENERAR NÚMERO</button>

<div id="resultado" class="resultado"></div>

<h2>🔥 NÚMERO CALIENTE DEL DÍA 🔥</h2>

<div class="numero caliente" id="caliente"></div>

<div class="favoritos">

<h2>⭐ FAVORITOS DE LA REINA ⭐</h2>

<div id="listaFavoritos">

<div class="numero">12</div>
<div class="numero">33</div>
<div class="numero">70</div>
<div class="numero">88</div>

</div>

</div>

<br>

<button class="whatsapp" onclick="window.open('https://wa.me/5493517682897')">
💬 JUGAR POR WHATSAPP
</button>

<br><br>

<button onclick="panel()">Panel secreto</button>

<div id="admin">

<h3>Editar favoritos</h3>

<textarea id="favEdit">

12
33
70
88

</textarea>

<br>

<button onclick="guardar()">Guardar</button>

</div>

</div>

<script>

function generar(){

let palabra=document.getElementById("palabra").value

let numero=0

for(let i=0;i<palabra.length;i++){

numero+=palabra.charCodeAt(i)

}

numero=numero%10000

document.getElementById("resultado").innerHTML=numero

}

function numeroCaliente(){

let n=Math.floor(Math.random()*100)

document.getElementById("caliente").innerHTML=n

}

numeroCaliente()

function panel(){

let clave=prompt("Clave admin")

if(clave==="832"){

document.getElementById("admin").style.display="block"

}else{

alert("Clave incorrecta")

}

}

function guardar(){

let texto=document.getElementById("favEdit").value

let lista=texto.split("\n")

let html=""

lista.forEach(n=>{

html+=`<div class="numero">${n}</div>`

})

document.getElementById("listaFavoritos").innerHTML=html

}

</script>

</body>

  </html>
