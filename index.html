<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LA REINA 832</title>

<style>

body{
font-family: Arial;
text-align:center;
color:white;
margin:0;

background-image:url("https://raw.githubusercontent.com/lareina832/la-reina-832/main/Polish_20260304_093055926.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

h1{
font-size:40px;
margin-top:25px;
text-shadow:2px 2px 10px black;
}

.panel{
background:rgba(0,0,0,0.65);
padding:25px;
margin:20px auto;
width:90%;
max-width:650px;
border-radius:15px;

box-shadow:0 0 10px #ff4da6;
animation:brilloPanel 3s infinite alternate;
}

@keyframes brilloPanel{

0%{box-shadow:0 0 10px #ff4da6;}
100%{box-shadow:0 0 25px #ff4da6;}

}

.numero{
font-size:70px;
color:#ff4da6;
font-weight:bold;
margin:20px;
animation:brillo 2s infinite;
}

@keyframes brillo{

0%{text-shadow:0 0 10px #ff4da6;}
50%{text-shadow:0 0 35px #ff4da6;}
100%{text-shadow:0 0 10px #ff4da6;}

}

.resultadoGrande{
font-size:32px;
font-weight:bold;
}

input{
padding:14px;
width:85%;
font-size:22px;
text-align:center;
text-transform:uppercase;
}

button{
background:#ff4da6;
border:none;
color:white;
padding:14px 25px;
margin-top:10px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

.mensaje{
font-size:22px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 10px black;
}

/* PANEL LOS 3 DE LAS 3 */

.panel3{
position:fixed;
right:20px;
top:35%;
background:rgba(0,0,0,0.65);
border:2px solid #ff4da6;
border-radius:15px;
padding:15px;

box-shadow:
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;

animation:brilloReina 2s infinite alternate;
}

.numero3{
font-size:34px;
font-weight:bold;
color:#ffd700;
margin:5px;
animation:latido 1.5s infinite;
}

@keyframes brilloReina{

0%{
box-shadow:0 0 10px #ff4da6;
}

100%{
box-shadow:0 0 40px #ff4da6;
}

}

@keyframes latido{

0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%
