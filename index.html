<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LA REINA 832</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("https://raw.githubusercontent.com/lareina832/la-reina-832/main/Polish_20260304_093055926.jpg");

background-attachment:fixed;
}

.capa{

min-height:100vh;
padding:30px;
}

h1{

text-shadow:0 0 25px #ff00cc;
}

input{
padding:18px;
font-size:24px;
border-radius:12px;
border:none;
width:80%;

}

button{
padding:15px 30px;

}

.boton{
background:#ff2ec4;
color:white;
}

.resultado{
font-size:55px;

}

.numero{

}

table{

margin:auto;

}

td,th{
padding:10px;
}

#admin{
display:none;

}

textarea{

}

.whatsapp{

</style>

</head>

<body>

<div class="capa">

<h1>👑 LA REINA 832 👑</h1>

<p>Ingresá una palabra y descubrí tu número</p>

<input id="palabra" placeholder="Escribe una palabra">

<br>

<button class="boton" onclick="generar()">GENERAR</button>

<div id="resultado" class="resultado"></div>

<h2>🔥 NÚMERO CALIENTE 🔥</h2>

<div id="caliente" class="numero caliente"></div>

<h2>⭐ FAVORITOS DE LA REINA ⭐</h2>

<div id="listaFavoritos">

<div class="numero">12</div>
<div class="numero">33</div>
<div class="numero">70</div>
<div class="numero">88</div>

</div>

<h2>📊 RESULTADOS DEL DÍA</h2>

<table>

<tr>
<th>Lotería</th>
<th>Número</th>
</tr>

<tr>
<td>Ciudad</td>
<td id="ciudad">----</td>
</tr>

<tr>
<td>Provincia</td>
<td id="provincia">----</td>
</tr>

<tr>
<td>Córdoba</td>
<td id="cordoba">----</td>
</tr>

<tr>
<td>Santa Fe</td>
<td id="santafe">----</td>
</tr>

<tr>
<td>Entre Ríos</td>
<td id="entrerios">----</td>
</tr>

<tr>
<td>Uruguay</td>
<td id="uruguay">----</td>
</tr>

</table>

<br>

<button class="whatsapp" onclick="window.open('https://wa.me/5493517682897')">
💬 JUGAR POR WHATSAPP
</button>

<br><br>

<button onclick="panel()">Panel secreto</button>

<div id="admin">

<h3>Editar favoritos</h3>

<textarea id="favEdit">

12
33
70
88

</textarea>

<br>

<button onclick="guardar()">Guardar</button>

</div>

</div>

<script>

function generar(){

let palabra=document.getElementById("palabra").value.toUpperCase()

let tabla={

"REINA":1832,
"AMOR":2478,
"DINERO":3912,
"SUERTE":7788

}

let numero

if(tabla[palabra]){

numero=tabla[palabra]

}else{

numero=0

for(let i=0;i<palabra.length;i++){

numero+=palabra.charCodeAt(i)

}

numero=numero%10000

}

document.getElementById("resultado").innerHTML=numero

}

function numeroCaliente(){

let n=Math.floor(Math.random()*100)

document.getElementById("caliente").innerHTML=n

}

numeroCaliente()

function panel(){

let clave=prompt("Clave admin")

if(clave==="832"){

document.getElementById("admin").style.display="block"

}else{

alert("Clave incorrecta")

}

}

function guardar(){

let texto=document.getElementById("favEdit").value

let lista=texto.split("\n")

let html=""

lista.forEach(n=>{

html+=`<div class="numero">${n}</div>`

})

document.getElementById("listaFavoritos").innerHTML=html

}

function cargarResultados(){

document.getElementById("ciudad").innerHTML="3838"
document.getElementById("provincia").innerHTML="9518"
document.getElementById("cordoba").innerHTML="2588"
document.getElementById("santafe").innerHTML="1170"
document.getElementById("entrerios").innerHTML="5133"
document.getElementById("uruguay").innerHTML="738"

}

cargarResultados()

</script>

</body>
