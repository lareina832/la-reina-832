<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LA REINA 832 VIP</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(135deg,#1a001a,#000000);
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:400px;
background:#0d0d0d;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px #ff00cc;
}

h1{
color:#ff00cc;
text-shadow:0 0 20px #ff00cc;
font-size:22px;
}

.mensaje{
margin-top:10px;
font-size:14px;
color:#ffccff;
}

.favoritos{
margin-top:15px;
padding:10px;
background:#1a001a;
border-radius:10px;
box-shadow:0 0 10px #ff00cc;
}

input{
padding:12px;
width:100%;
border:none;
border-radius:10px;
margin-top:10px;
text-align:center;
font-size:16px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#ff00cc;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 15px #ff00cc;
}

#resultado{
margin-top:20px;
font-size:18px;
color:#00ff99;
text-shadow:0 0 10px #00ff99;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<div id="login">
<h1>👑 LA REINA 832 VIP 👑</h1>
<p>Acceso exclusivo</p>
<input type="password" id="clave" placeholder="Ingresa clave secreta">
<button onclick="verificar()">INGRESAR</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">
<h1>Generador Oficial</h1>

<div class="mensaje">
💌 Hoy la suerte camina conmigo. Confío. Juego. Gano. 👑✨
</div>

<div class="favoritos" id="favoritosBox">
</div>

<input type="text" id="palabra" placeholder="Ingresa tu palabra">
<button onclick="generar()">GENERAR NÚMERO</button>

<div id="resultado"></div>

</div>

</div>

<script>

/* ============================
   👑 ZONA PRO EDITABLE 👑
   Solo modificá esta línea:
============================ */

var favoritosDelDia = "18 — 32 — 47 — 83";

/* ============================
   No tocar debajo si no sabés
============================ */

document.getElementById("favoritosBox").innerHTML =
"⭐ <strong>Favoritos del Día:</strong><br>" + favoritosDelDia;

function verificar(){
var clave=document.getElementById("clave").value;

if(clave==="832VIP"){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}else{
document.getElementById("error").innerText="Clave incorrecta 👑";
}
}

function generar(){
var palabra=document.getElementById("palabra").value.toUpperCase();
var total=0;

if(palabra==="REINA"){
total=1832;
}else{
for(var i=0;i<palabra.length;i++){
if(palabra.charCodeAt(i)>=65 && palabra.charCodeAt(i)<=90){
total+=palabra.charCodeAt(i)-64;
}
}
}

document.getElementById("resultado").innerHTML=
"✨ "+palabra+" → "+total+" ✨";
}
</script>

</body>
</html>
